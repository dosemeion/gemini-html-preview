<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 预览 - Gemini</title>
  <link rel="stylesheet" href="preview.css">
</head>
<body>

<div id="toolbar">
  <div id="toolbar-left">
    <span class="logo">⧉</span>
    <span>Gemini HTML 预览</span>
  </div>
  <div id="toolbar-right">
    <div id="size-controls">
      <button class="size-btn active" data-device="desktop" title="桌面">🖥 桌面</button>
      <button class="size-btn" data-device="tablet" title="平板">⬜ 平板</button>
      <button class="size-btn" data-device="mobile" title="手机">📱 手机</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-secondary" id="btn-source">查看源码</button>
    <button class="btn btn-secondary" id="btn-copy">复制 HTML</button>
    <button class="btn btn-primary" id="btn-download">下载 HTML</button>
  </div>
</div>

<div id="preview-container">
  <iframe id="preview-frame" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
  <div id="error-panel">
    <span class="icon">⚠️</span>
    <span>没有找到可预览的 HTML 内容</span>
  </div>
</div>

<div id="source-modal">
  <div id="source-box">
    <button id="close-modal" title="关闭">✕</button>
    <pre id="source-content"></pre>
  </div>
</div>

<script src="katex.min.js"></script>
<script src="auto-render.min.js"></script>
<script src="preview.js"></script>
</body>
</html>
